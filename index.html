<script>

/* =========================
   NORMALIZADORES
========================= */

function normEstado(v){
  const s = String(v || '')
    .trim()
    .toUpperCase();

  if(
    s.includes('DESP')
  ) return 'DESPACHADO';

  if(
    s.includes('PEND') ||
    s.includes('PROCES') ||
    s.includes('PTE')
  ) return 'PENDIENTE';

  return 'PENDIENTE';
}

function normText(v){
  return String(v || '')
    .trim()
    .toUpperCase();
}

/* =========================
   NUMEROS
========================= */

function toN(v){
  if(v===''||v===null||v===undefined)return 0;

  const n=parseFloat(
    String(v)
      .replace(/,/g,'.')
      .replace(/[^\d.-]/g,'')
  );

  return isNaN(n)?0:n;
}

/* =========================
   FECHAS
========================= */

function fmtD(v){

  if(!v && v!==0) return '';

  try{

    // excel serial
    if(typeof v==='number'){

      const d = new Date(
        Math.round((v-25569)*86400*1000)
      );

      return d.toISOString().slice(0,10);
    }

    // date
    if(v instanceof Date){
      return v.toISOString().slice(0,10);
    }

    const s = String(v).trim();

    if(!s || s==='null') return '';

    // dd/mm/yyyy
    const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);

    if(m){
      return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    }

    // yyyy-mm-dd
    if(/^\d{4}-\d{2}-\d{2}/.test(s)){
      return s.slice(0,10);
    }

    return '';

  }catch{
    return '';
  }
}

/* =========================
   NORMALIZAR DESPACHO
========================= */

function normD(rows){

  return rows
    .filter(r=>{

      const op = String(
        r['OP-N\u00b0'] ||
        r['OP-N'] ||
        ''
      ).trim();

      return op && op.length > 1;
    })

    .map(r=>{

      const estado = normEstado(r['ESTADO']);

      const fD = fmtD(r['F. DESPACHO']);

      const fA = fmtD(
        r['F.COMPROMISO.AUT'] ||
        r['F. COMPROMISO.AUT']
      );

      const cumple =
        estado === 'DESPACHADO' &&
        fD &&
        fA &&
        new Date(fD).getTime() <= new Date(fA).getTime()
          ? 1
          : 0;

      return {

        op:String(
          r['OP-N\u00b0'] ||
          r['OP-N'] ||
          ''
        ).trim(),

        tipo:normText(
          r['OP']
        ),

        forma_pago:normText(
          r['FORMA.PAGO'] ||
          r['FORMA DE PAGO']
        ),

        fecha_pedido:fmtD(
          r['F. PEDIDO']
        ),

        fecha_compromiso:fmtD(
          r['F. COMPROMISO']
        ),

        fecha_compromiso_aut:fA,

        fecha_despacho:fD,

        cantidad:toN(
          r['Q']
        ),

        cod:String(
          r['COD'] ||
          ''
        ).trim(),

        producto:String(
          r['PRODUCTOS NO INDUSTRIALES'] ||
          ''
        ).trim(),

        cliente:String(
          r['CLIENTE'] ||
          ''
        ).trim(),

        rango:normText(
          r['RANGO']
        ),

        estado,

        cumple

      };

    })

    .filter(r=>
      r.op &&
      r.producto &&
      r.producto.length > 1
    );
}

/* =========================
   FILTRO DESPACHOS
========================= */

function dFilter(){

  const q = $('d-q')
    .value
    .toLowerCase();

  const est = $('d-est').value;

  const op = $('d-op').value;

  const rng = $('d-rng').value;

  const mes = $('d-mes').value;

  const fp = $('d-fp').value;

  dData = DESPACHO.filter(d=>{

    if(
      q &&
      !(
        d.op +
        ' ' +
        d.producto +
        ' ' +
        d.cliente +
        ' ' +
        d.cod
      )
      .toLowerCase()
      .includes(q)
    ){
      return false;
    }

    // ESTADO
    if(
      est &&
      normEstado(d.estado) !== est
    ){
      return false;
    }

    // TIPO
    if(
      op &&
      d.tipo !== op
    ){
      return false;
    }

    // RANGO
    if(
      rng &&
      d.rango !== rng
    ){
      return false;
    }

    // FORMA PAGO
    if(
      fp &&
      d.forma_pago !== fp
    ){
      return false;
    }

    // MES
    if(
      mes &&
      (
        d.fecha_despacho ||
        d.fecha_pedido ||
        ''
      ).slice(0,7)!==mes
    ){
      return false;
    }

    return true;

  });

  dPage = 1;

  renderD();
}

/* =========================
   RENDER DESPACHOS
========================= */

function renderD(){

  const s = sArr(
    dData,
    dSK,
    dSD
  );

  const tot = s.length;

  const st = (dPage-1)*PER;

  const pg = s.slice(
    st,
    st+PER
  );

  h(
    'd-body',

    pg.map(d=>`

<tr>

<td class="bold">${d.op}</td>

<td>
  <span class="bd ${
    d.tipo==='JJP'
      ? 'bd-blu'
      : 'bd-grn'
  }">
    ${d.tipo}
  </span>
</td>

<td>${fpB(d.forma_pago)}</td>

<td>${d.fecha_despacho || '-'}</td>

<td>${d.fecha_compromiso_aut || '-'}</td>

<td style="color:var(--mut);font-size:12px">
  ${d.cod}
</td>

<td title="${d.producto}">
  ${tr(d.producto,38)}
</td>

<td
 title="${d.cliente}"
 style="font-size:12px"
>
  ${tr(d.cliente,32)}
</td>

<td class="right bold">
  ${n(d.cantidad)}
</td>

<td>${rngB(d.rango)}</td>

<td>${estB(d.estado)}</td>

<td>

${
  d.estado !== 'DESPACHADO'

  ? '<span class="bd bd-gry">-</span>'

  : d.cumple===1

    ? '<span class="bd bd-grn">SI</span>'

    : '<span class="bd bd-red">NO</span>'
}

</td>

</tr>

`).join('')
  );

  h(
    'd-info',
    'Mostrando '+
    (st+1)+
    '-'+
    Math.min(st+PER,tot)+
    ' de '+
    n(tot)+
    ' registros'
  );

  pgn(
    'd-pgn',
    Math.ceil(tot/PER),
    dPage,
    p=>{
      dPage=p;
      renderD();
    }
  );
}

/* =========================
   KPI RESUMEN
========================= */

function buildR(){

  const total = DESPACHO.length;

  const despachados = DESPACHO.filter(
    d=>d.estado==='DESPACHADO'
  );

  const pendientes = DESPACHO.filter(
    d=>d.estado==='PENDIENTE'
  );

  const validOTIF = despachados.filter(
    d=>
      d.fecha_despacho &&
      d.fecha_compromiso_aut
  );

  const otif = validOTIF.filter(
    d=>d.cumple===1
  ).length;

  const crit = STOCK.filter(
    s=>s.producir==='SI'
  ).length;

  h('k-total',n(total));

  h('k-desp',n(despachados.length));

  h(
    'k-desp-s',
    pct(
      despachados.length,
      total
    ) + ' del total'
  );

  h(
    'k-pend',
    n(pendientes.length)
  );

  h(
    'k-otif',
    pct(
      otif,
      validOTIF.length
    )
  );

  h(
    'k-crit',
    String(crit)
  );
}

/* =========================
   BADGES
========================= */

const estB=e=>{

  if(e==='DESPACHADO'){
    return `
      <span class="bd bd-grn">
        Despachado
      </span>
    `;
  }

  return `
    <span class="bd bd-ylw">
      Pendiente
    </span>
  `;
};

const fpB=f=>{

  const m={
    CREDITO:'bd-blu',
    CONTADO:'bd-grn',
    ADELANTO:'bd-pur'
  };

  return f
    ? `
      <span class="bd ${m[f]||'bd-gry'}">
        ${f}
      </span>
    `
    : `
      <span style="color:var(--mut)">
        -
      </span>
    `;
};

const rngB=r=>{

  const m={
    PLATINO:'bd-pur',
    ORO:'bd-ylw',
    PLATA:'bd-blu',
    BRONCE:'bd-gry',
    'SIN RANGO':'bd-gry'
  };

  return `
    <span class="bd ${m[r]||'bd-gry'}">
      ${r||'-'}
    </span>
  `;
};

</script>
