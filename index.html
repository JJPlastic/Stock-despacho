<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Stock y Despachos</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{
--bg:#07090f;
--s1:#0e1117;
--s2:#141820;
--s3:#1a1f2b;
--brd:#1e2535;
--acc:#3b82f6;
--grn:#22c55e;
--ylw:#f59e0b;
--red:#ef4444;
--pur:#a855f7;
--txt:#dde4f0;
--lt:#8b97b0;
--mut:#4a5568;
--font:'DM Sans',sans-serif;
--head:'Bebas Neue',sans-serif
}
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:var(--font);
background:var(--bg);
color:var(--txt);
min-height:100vh
}
</style>
</head>

<body>

<script>

const SB_URL='https://feqveonxrptqqxowjaii.supabase.co';
const SB_KEY='TU_KEY';

let DESPACHO=[];

function limpiarEstado(valor){

    if(valor===null || valor===undefined) return 'PENDIENTE';

    const txt = String(valor)
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,'');

    if(
        txt.includes('DESPACH')
    ){
        return 'DESPACHADO';
    }

    return 'PENDIENTE';
}

function limpiarTexto(v){
    if(v===null || v===undefined) return '';

    return String(v)
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,'');
}

function normD(rows){

return rows
.filter(r=>{
    const op = String(r['OP-N°'] || r['OP-N'] || '').trim();
    return op && op.length>1;
})
.map(r=>{

    const estadoReal = limpiarEstado(r['ESTADO']);

    return{

        op:String(r['OP-N°']||r['OP-N']||'').trim(),

        tipo:limpiarTexto(r['OP']),

        forma_pago:limpiarTexto(
            r['FORMA.PAGO'] ||
            r['FORMA DE PAGO'] ||
            ''
        ),

        producto:String(
            r['PRODUCTOS NO INDUSTRIALES'] || ''
        ).trim(),

        cliente:String(
            r['CLIENTE'] || ''
        ).trim(),

        rango:limpiarTexto(r['RANGO']),

        estado:estadoReal,

        cantidad:Number(r['Q']) || 0

    };

});
}

function dFilter(){

    const q = limpiarTexto(
        document.getElementById('d-q').value
    );

    const est = limpiarTexto(
        document.getElementById('d-est').value
    );

    const op = limpiarTexto(
        document.getElementById('d-op').value
    );

    const rng = limpiarTexto(
        document.getElementById('d-rng').value
    );

    const fp = limpiarTexto(
        document.getElementById('d-fp').value
    );

    const filtrado = DESPACHO.filter(d=>{

        const texto = limpiarTexto(
            d.op+' '+d.producto+' '+d.cliente
        );

        if(q && !texto.includes(q)){
            return false;
        }

        if(est && limpiarEstado(d.estado)!==est){
            return false;
        }

        if(op && limpiarTexto(d.tipo)!==op){
            return false;
        }

        if(rng && limpiarTexto(d.rango)!==rng){
            return false;
        }

        if(fp && limpiarTexto(d.forma_pago)!==fp){
            return false;
        }

        return true;

    });

    renderTabla(filtrado);

}

function renderTabla(data){

    const body = document.getElementById('d-body');

    body.innerHTML = data.map(d=>`

<tr>

<td>${d.op}</td>

<td>${d.tipo}</td>

<td>${d.forma_pago}</td>

<td>${d.producto}</td>

<td>${d.cliente}</td>

<td>${d.cantidad}</td>

<td>
${
d.estado==='DESPACHADO'
?
'<span style="color:#22c55e;font-weight:bold">DESPACHADO</span>'
:
'<span style="color:#f59e0b;font-weight:bold">PENDIENTE</span>'
}
</td>

</tr>

`).join('');

}

async function loadData(){

    try{

        const r = await fetch(
            SB_URL+'/rest/v1/excel_data?sheet_name=eq.DESPACHO',
            {
                headers:{
                    apikey:SB_KEY,
                    Authorization:'Bearer '+SB_KEY
                }
            }
        );

        const rows = await r.json();

        DESPACHO = normD(
            rows.map(x=>x.data)
        );

        renderTabla(DESPACHO);

    }catch(err){

        alert('ERROR: '+err.message);

    }

}

document.body.innerHTML += `

<div style="padding:20px">

<h1 style="margin-bottom:20px">
DESPACHOS
</h1>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">

<input
id="d-q"
placeholder="Buscar..."
oninput="dFilter()"
style="padding:10px"
/>

<select
id="d-est"
onchange="dFilter()"
style="padding:10px"
>
<option value="">TODOS</option>
<option value="DESPACHADO">DESPACHADO</option>
<option value="PENDIENTE">PENDIENTE</option>
</select>

<select
id="d-op"
onchange="dFilter()"
style="padding:10px"
>
<option value="">TODOS</option>
<option value="JJP">JJP</option>
<option value="PTK">PTK</option>
</select>

<select
id="d-rng"
onchange="dFilter()"
style="padding:10px"
>
<option value="">TODOS</option>
<option value="PLATINO">PLATINO</option>
<option value="ORO">ORO</option>
<option value="PLATA">PLATA</option>
<option value="BRONCE">BRONCE</option>
<option value="SIN RANGO">SIN RANGO</option>
</select>

<select
id="d-fp"
onchange="dFilter()"
style="padding:10px"
>
<option value="">TODOS</option>
<option value="CREDITO">CREDITO</option>
<option value="CONTADO">CONTADO</option>
<option value="ADELANTO">ADELANTO</option>
</select>

</div>

<table
border="1"
cellpadding="10"
style="
width:100%;
border-collapse:collapse;
background:#111827;
color:white;
"
>

<thead>

<tr>
<th>OP</th>
<th>TIPO</th>
<th>F.PAGO</th>
<th>PRODUCTO</th>
<th>CLIENTE</th>
<th>CANT</th>
<th>ESTADO</th>
</tr>

</thead>

<tbody id="d-body"></tbody>

</table>

</div>

`;

loadData();

</script>

</body>
</html>
